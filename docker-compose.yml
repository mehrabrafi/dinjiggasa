version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: dinjiggasa
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/dinjiggasa?schema=public
      PORT: 3001
      JWT_SECRET: your_random_secret_here
      # Update these to match your server IP or Domain
      FRONTEND_URL: https://deenjiggasa.info
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    environment:
      # Browser needs to hit the public IP/domain
      NEXT_PUBLIC_API_URL: https://deenjiggasa.info/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  db-data:
