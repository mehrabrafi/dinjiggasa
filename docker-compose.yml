version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: dinjiggasa
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/dinjiggasa?schema=public
      PORT: 3001
      JWT_SECRET: your_random_secret_here
      # Update these to match your server IP or Domain
      FRONTEND_URL: https://deenjiggasa.info
      # Cloudflare R2 Storage
      R2_ACCESS_KEY_ID: "4a2a0e34d50f9d9d6e33d220130b8aec"
      R2_SECRET_ACCESS_KEY: "10ce5b6107cdd7459cd96fb826e58679607baf639cfda005ecfd9ca8db9d1169"
      R2_BUCKET_NAME: "deenjiggasa"
      R2_ENDPOINT: "https://cfa83ebbd807204ffc47084e0880ca94.r2.cloudflarestorage.com"
      R2_PUBLIC_URL: "https://media.deenjiggasa.info"
      # Zoho ZeptoMail
      ZEPTOMAIL_API_TOKEN: "Zoho-enczapikey wSsVR60l+ET2WqZ8yGWsdO9rmw9UBAikREws2Abz4yL4F6+Xosc5xBedDQL2TfAbRWA7E2AX8e0vmRoI2zEK3dgtzQ5WCyiF9mqRe1U4J3x17qnvhDzJW2pZlhuBLosJzgRrmGdhGsog+g=="
      ZEPTOMAIL_SENDER_ADDRESS: "contact@deenjiggasa.info"
      ZEPTOMAIL_SENDER_NAME: "DinJiggasa"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://deenjiggasa.info/api/v1
    restart: always
    environment:
      # Browser needs to hit the public IP/domain
      NEXT_PUBLIC_API_URL: https://deenjiggasa.info/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  db-data:
